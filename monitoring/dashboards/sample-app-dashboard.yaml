apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sample-app.json: |
    {
      "title": "Sample App Dashboard",
      "uid": "sample-app",
      "timezone": "browser",
      "refresh": "10s",
      "panels": [
        {
          "id": 1,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_status_phase{namespace='default',phase='Running',pod=~'sample-app.*'})",
            "legendFormat": "Running Pods"
          }]
        },
        {
          "id": 2,
          "title": "Pod Restarts",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 0},
          "targets": [{
            "expr": "sum(kube_pod_container_status_restarts_total{namespace='default',pod=~'sample-app.*'})",
            "legendFormat": "Restarts"
          }]
        },
        {
          "id": 3,
          "title": "CPU Usage",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='default',pod=~'sample-app.*'}[5m])) by (pod)",
            "legendFormat": "{{pod}}"
          }]
        },
        {
          "id": 4,
          "title": "Memory Usage",
          "type": "graph",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "sum(container_memory_usage_bytes{namespace='default',pod=~'sample-app.*'}) by (pod)",
            "legendFormat": "{{pod}}"
          }]
        }
      ],
      "schemaVersion": 27
    }
