apiVersion: v1
kind: ConfigMap
metadata:
  name: sample-app-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  sample-app.json: |
    {
      "title": "Sample App & Cluster Dashboard",
      "uid": "sample-app-dashboard",
      "timezone": "browser",
      "refresh": "10s",
      "schemaVersion": 27,
      "panels": [
        {
          "id": 1,
          "title": "Total Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 0, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_info{namespace='default',pod=~'sample-app.*'})",
            "legendFormat": "Total Pods"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 2,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 4, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_status_phase{namespace='default',phase='Running',pod=~'sample-app.*'})",
            "legendFormat": "Running"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "thresholds": {
              "steps": [
                {"color": "red", "value": 0},
                {"color": "yellow", "value": 1},
                {"color": "green", "value": 2}
              ]
            }
          }
        },
        {
          "id": 3,
          "title": "Pending Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_status_phase{namespace='default',phase='Pending',pod=~'sample-app.*'}) or vector(0)",
            "legendFormat": "Pending"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "thresholds": {
              "steps": [
                {"color": "green", "value": 0},
                {"color": "red", "value": 1}
              ]
            }
          }
        },
        {
          "id": 4,
          "title": "CrashLoop Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 12, "y": 0},
          "targets": [{
            "expr": "count(kube_pod_container_status_waiting_reason{namespace='default',reason='CrashLoopBackOff',pod=~'sample-app.*'}) or vector(0)",
            "legendFormat": "CrashLoop"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "thresholds": {
              "steps": [
                {"color": "green", "value": 0},
                {"color": "red", "value": 1}
              ]
            }
          }
        },
        {
          "id": 5,
          "title": "Nodes Ready",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 16, "y": 0},
          "targets": [{
            "expr": "count(kube_node_status_condition{condition='Ready',status='true'})",
            "legendFormat": "Nodes Ready"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "thresholds": {
              "steps": [
                {"color": "red", "value": 0},
                {"color": "yellow", "value": 1},
                {"color": "green", "value": 2}
              ]
            }
          }
        },
        {
          "id": 6,
          "title": "Total Nodes",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 20, "y": 0},
          "targets": [{
            "expr": "count(kube_node_info)",
            "legendFormat": "Total Nodes"
          }],
          "options": {
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 7,
          "title": "Pod CPU Usage %",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 4},
          "targets": [{
            "expr": "sum(rate(container_cpu_usage_seconds_total{namespace='default',pod=~'sample-app.*',container!=''}[5m])) by (pod) * 100",
            "legendFormat": "{{ pod }}"
          }],
          "options": {
            "tooltip": {"mode": "multi"}
          }
        },
        {
          "id": 8,
          "title": "Pod Memory Usage %",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 4},
          "targets": [{
            "expr": "sum(container_memory_usage_bytes{namespace='default',pod=~'sample-app.*',container!=''}) by (pod) / 1024 / 1024",
            "legendFormat": "{{ pod }} (MB)"
          }]
        },
        {
          "id": 9,
          "title": "Node CPU Usage %",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 12},
          "targets": [{
            "expr": "100 - (avg by(instance) (rate(node_cpu_seconds_total{mode='idle'}[5m])) * 100)",
            "legendFormat": "{{ instance }}"
          }]
        },
        {
          "id": 10,
          "title": "Node Memory Usage %",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 12},
          "targets": [{
            "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
            "legendFormat": "{{ instance }}"
          }]
        },
        {
          "id": 11,
          "title": "Pods per Node",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 20},
          "targets": [{
            "expr": "count(kube_pod_info{namespace='default'}) by (node)",
            "legendFormat": "{{ node }}"
          }]
        },
        {
          "id": 12,
          "title": "Pod Restart Count",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 20},
          "targets": [{
            "expr": "sum(kube_pod_container_status_restarts_total{namespace='default',pod=~'sample-app.*'}) by (pod)",
            "legendFormat": "{{ pod }}"
          }]
        }
      ]
    }
