apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "55.5.0"
    helm:
      values: |
        grafana:
          service:
            type: LoadBalancer
          adminPassword: "admin123"
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: default
                folder: ''
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              kubernetes-cluster:
                gnetId: 7249
                revision: 1
                datasource: Prometheus
              node-exporter:
                gnetId: 1860
                revision: 1
                datasource: Prometheus
              argocd:
                gnetId: 14584
                revision: 1
                datasource: Prometheus
        prometheus:
          service:
            type: LoadBalancer
          prometheusSpec:
            additionalScrapeConfigs:
            - job_name: sample-app
              static_configs:
              - targets:
                - sample-app-service.default.svc.cluster.local:80
        alertmanager:
          service:
            type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
