apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "55.5.0"
    helm:
      skipCrds: false
      values: |
        grafana:
          adminPassword: "admin123"
          service:
            type: NodePort
            nodePort: 31301
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
              - name: default
                folder: ''
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              kubernetes-cluster:
                gnetId: 7249
                revision: 1
                datasource: Prometheus
              node-exporter:
                gnetId: 1860
                revision: 1
                datasource: Prometheus
              argocd:
                gnetId: 14584
                revision: 1
                datasource: Prometheus
        prometheus:
          service:
            type: NodePort
            nodePort: 32413
          prometheusSpec:
            serviceMonitorSelectorNilUsesHelmValues: false
            additionalScrapeConfigs:
            - job_name: sample-app
              static_configs:
              - targets:
                - sample-app-service.default.svc.cluster.local:80
        alertmanager:
          service:
            type: NodePort
            nodePort: 30296
          config:
            global:
              resolve_timeout: 5m
            route:
              group_by: ['alertname', 'severity']
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 12h
              receiver: 'pagerduty-alerts'
              routes:
              - match:
                  severity: critical
                receiver: 'pagerduty-critical'
                repeat_interval: 1h
              - match:
                  severity: warning
                receiver: 'pagerduty-warning'
                repeat_interval: 3h
            receivers:
            - name: 'pagerduty-alerts'
              pagerduty_configs:
              - service_key: 'd6a6dd1aa07f4d05d04b09ace12e7aae'
                send_resolved: true
                description: '{{ .CommonLabels.alertname }}'
                details:
                  severity: '{{ .CommonLabels.severity }}'
                  summary: '{{ .CommonAnnotations.summary }}'
                  description: '{{ .CommonAnnotations.description }}'
            - name: 'pagerduty-critical'
              pagerduty_configs:
              - service_key: 'd6a6dd1aa07f4d05d04b09ace12e7aae'
                send_resolved: true
                severity: critical
                description: '🔴 CRITICAL: {{ .CommonLabels.alertname }}'
                details:
                  severity: '{{ .CommonLabels.severity }}'
                  summary: '{{ .CommonAnnotations.summary }}'
                  description: '{{
