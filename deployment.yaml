apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: sample-app
        image: asia-south1-docker.pkg.dev/ccd-poc-project/sample-app/sample-app:e653f578adcc1e608d9851f2b497736d1e369c51
        ports:
        - containerPort: 80
