apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
spec:
  replicas: 4
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
      - name: sample-app
        image: asia-south1-docker.pkg.dev/ccd-poc-project/sample-app/sample-app:e092232f7a87fe3b2cdd35f7eccafc377e019f0e
        ports:
        - containerPort: 80
